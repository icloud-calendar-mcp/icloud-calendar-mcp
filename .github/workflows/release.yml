name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for PyPI trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build fat JAR
        run: ./gradlew fatJar

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify JAR exists
        run: ls -la build/libs/icloud-calendar-mcp-*-all.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/libs/icloud-calendar-mcp-*-all.jar
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    needs: release
    environment:
      name: npm
      url: https://www.npmjs.com/package/@icloud-calendar-mcp/server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        # Node 24 ships with npm 11.x, which supports OIDC trusted publishing.
        # Older Node + `npm install -g npm@latest` self-upgrade hits
        # MODULE_NOT_FOUND issues on the runner, so we let setup-node pull a
        # Node version where the bundled npm is already new enough.
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package version
        working-directory: npm-package
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Download JAR from release
        working-directory: npm-package
        run: |
          mkdir -p lib
          curl -L -o lib/icloud-calendar-mcp-${{ steps.version.outputs.version }}-all.jar \
            https://github.com/icloud-calendar-mcp/icloud-calendar-mcp/releases/download/v${{ steps.version.outputs.version }}/icloud-calendar-mcp-${{ steps.version.outputs.version }}-all.jar

      - name: Strip stale auth from .npmrc (OIDC handles auth)
        # actions/setup-node writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
        # into .npmrc. With NODE_AUTH_TOKEN unset that line becomes the literal
        # string `${NODE_AUTH_TOKEN}`, which npm interprets as a (bogus) bearer
        # token instead of falling through to OIDC trusted publishing.
        run: |
          if [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            sed -i '/_authToken=/d' "$NPM_CONFIG_USERCONFIG" || true
            echo "Scrubbed auth lines from $NPM_CONFIG_USERCONFIG"
            cat "$NPM_CONFIG_USERCONFIG"
          fi

      - name: Publish to npm
        # Auth via npm Trusted Publisher OIDC (configured at npmjs.com).
        # Requires `id-token: write` at the workflow level (already set above).
        # No NODE_AUTH_TOKEN env — npm picks up the OIDC token automatically.
        working-directory: npm-package
        run: npm publish --access public --provenance

  publish-pypi:
    runs-on: ubuntu-latest
    needs: release
    environment:
      name: pypi
      url: https://pypi.org/project/icloud-calendar-mcp/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package version
        working-directory: py-package
        run: sed -i "s/version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml

      - name: Update downloader version
        working-directory: py-package
        run: sed -i "s/VERSION = \".*\"/VERSION = \"${{ steps.version.outputs.version }}\"/" src/icloud_calendar_mcp/downloader.py

      - name: Update __init__ version
        working-directory: py-package
        run: sed -i "s/__version__ = \".*\"/__version__ = \"${{ steps.version.outputs.version }}\"/" src/icloud_calendar_mcp/__init__.py

      - name: Update cli JAR_NAME version
        working-directory: py-package
        run: sed -i "s/JAR_NAME = \"icloud-calendar-mcp-.*-all.jar\"/JAR_NAME = \"icloud-calendar-mcp-${{ steps.version.outputs.version }}-all.jar\"/" src/icloud_calendar_mcp/cli.py

      - name: Build package
        working-directory: py-package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: py-package/dist/
